{% set name = "fits2image" %}
{% set version = "0.4.11" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/fits2image-{{ version }}.tar.gz
  sha256: 9ac63a3e01d17a36091e3dff394dd3dfc03acfba4fb69e93b340d958425e5450

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
  run:
    - python >={{ python_min }}
    - numpy
    - astropy-base
    - pillow

test:
  imports:
    - fits2image
  commands:
    - pip check
  requires:
    - python  {{ python_min }}
    - pip

about:
  home: https://github.com/LCOGT/fits2image
  summary: Common libraries for the conversion and scaling of fits images
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - phycodurus
